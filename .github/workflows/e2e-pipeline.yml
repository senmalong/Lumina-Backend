name: "E2E Pipeline — Green Light Gate"

# ─────────────────────────────────────────────────────────────────────────────
# This workflow is the "Ultimate Quality Gate" for Vesting Vault.
# It MUST pass before any deployment is allowed.
#
# Pipeline stages:
#   1. lint          — Fast static checks (fail fast)
#   2. unit-tests    — Backend Jest unit tests
#   3. contract-tests — Soroban smart contract tests (Rust)
#   4. e2e-tests     — Cypress user-journey against Stellar Quickstart
#   5. green-light   — Summary gate job (required by branch protection rules)
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main, develop, "feature/*", "release/*"]
  pull_request:
    branches: [main, develop]
  # Allow manual runs for on-demand pre-deployment verification
  workflow_dispatch:
    inputs:
      skip_contracts:
        description: 'Skip smart contract tests (faster iteration)'
        required: false
        default: 'false'
        type: boolean

# Cancel in-progress runs on the same branch to save resources
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  RUST_TOOLCHAIN: stable

# ─────────────────────────────────────────────────────────────────────────────
jobs:

  # ── Stage 1: Lint ────────────────────────────────────────────────────────────
  lint:
    name: "Lint & Static Analysis"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Check for syntax errors
        working-directory: backend
        run: node --check src/index.js

      - name: Run npm audit (high severity)
        working-directory: backend
        run: npm audit --audit-level=high --omit=dev || true

  # ── Stage 2: Unit Tests ──────────────────────────────────────────────────────
  unit-tests:
    name: "Backend Unit Tests"
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: vesting_vault_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Create .env for tests
        working-directory: backend
        run: |
          cp .env.example .env
          echo "DB_HOST=localhost"     >> .env
          echo "DB_PORT=5432"         >> .env
          echo "DB_NAME=vesting_vault_test" >> .env
          echo "DB_USER=postgres"     >> .env
          echo "DB_PASSWORD=password" >> .env
          echo "NODE_ENV=test"        >> .env
          echo "JWT_SECRET=test-jwt-secret-e2e-pipeline" >> .env
          echo "JWT_REFRESH_SECRET=test-refresh-secret-e2e-pipeline" >> .env

      - name: Create data directory
        working-directory: backend
        run: mkdir -p data

      - name: Run Jest unit tests
        working-directory: backend
        run: npm test
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_USER: postgres
          DB_PASSWORD: password
          DB_NAME: vesting_vault_test

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: unit-coverage
          path: backend/coverage/
          retention-days: 7

  # ── Stage 3: Smart Contract Tests ────────────────────────────────────────────
  contract-tests:
    name: "Soroban Smart Contract Tests"
    runs-on: ubuntu-latest
    needs: lint
    if: ${{ github.event.inputs.skip_contracts != 'true' }}

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust (${{ env.RUST_TOOLCHAIN }})
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            contracts/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install Stellar CLI
        run: |
          if ! command -v stellar &> /dev/null; then
            sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config libudev-dev
            cargo install --locked stellar-cli
          fi
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          # Ensure stellar is the name used if the script installs it as stellar
          sudo cp $HOME/.cargo/bin/stellar /usr/local/bin/soroban || true
          sudo cp $HOME/.cargo/bin/stellar /usr/local/bin/stellar || true

      - name: Build vesting-vault contract
        run: |
          cd contracts/vesting-vault
          cargo build --target wasm32-unknown-unknown --release

      - name: Run contract unit tests
        run: |
          cd contracts/vesting-vault
          cargo test -- --nocapture

      - name: Run reentrancy protection tests
        run: |
          if [ -d "contracts/reentrancy-tests" ]; then
            cd contracts/reentrancy-tests
            cargo test test_comprehensive_reentrancy_protection -- --nocapture
          else
            echo "No reentrancy-tests directory — skipping"
          fi

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v7
        with:
          name: vesting-vault-wasm
          path: contracts/target/wasm32-unknown-unknown/release/*.wasm
          retention-days: 7

  # ── Stage 4: E2E Tests (Cypress + Stellar Quickstart) ────────────────────────
  e2e-tests:
    name: "E2E User Journey (Cypress + Stellar Quickstart)"
    runs-on: ubuntu-latest
    needs: [unit-tests, contract-tests]
    # Run e2e even if contract-tests was skipped
    if: |
      always() &&
      needs.unit-tests.result == 'success' &&
      (needs.contract-tests.result == 'success' || needs.contract-tests.result == 'skipped')

    services:
      # PostgreSQL for the backend
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: vesting_vault
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      # Redis (optional — backend degrades gracefully if missing)
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3
        ports:
          - 6379:6379

      # Stellar Quickstart — standalone network with Soroban RPC
      stellar-quickstart:
        image: stellar/quickstart:latest
        ports:
          - 8000:8000
          - 8001:8001
        options: >-
          --health-cmd "curl -sf http://localhost:8000/health || exit 1"
          --health-interval 5s
          --health-timeout 10s
          --health-retries 30
          --health-start-period 30s
        env:
          STELLAR_LEDGER_CLOSE_INTERVAL: "1"
        # Run with standalone + Soroban RPC enabled
        # (GitHub Actions services don't support 'command' — use a workaround)

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Install Cypress and E2E dependencies
        run: |
          npm install --save-dev cypress@13 axios mocha-junit-reporter

      - name: Create backend .env for E2E
        working-directory: backend
        run: |
          cp .env.example .env
          cat >> .env << 'EOF'
          NODE_ENV=e2e
          PORT=4000
          DB_HOST=localhost
          DB_PORT=5432
          DB_NAME=vesting_vault
          DB_USER=postgres
          DB_PASSWORD=password
          JWT_SECRET=e2e-test-jwt-secret-not-for-production
          JWT_REFRESH_SECRET=e2e-test-refresh-secret-not-for-production
          STELLAR_RPC_URL=http://localhost:8000/rpc
          STELLAR_HORIZON_URL=http://localhost:8000
          STELLAR_NETWORK=standalone
          STELLAR_NETWORK_PASSPHRASE=Standalone Network ; February 2017
          SOROBAN_RPC_URL=http://localhost:8000/rpc
          REDIS_URL=redis://localhost:6379
          EOF

      - name: Create data directory
        working-directory: backend
        run: mkdir -p data

      - name: Wait for Stellar Quickstart
        run: |
          echo "Waiting for Stellar Quickstart at http://localhost:8000…"
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8000 >/dev/null 2>&1; then
              echo "Stellar Quickstart is ready (attempt $i)"
              break
            fi
            echo "Attempt $i/60…"
            sleep 3
          done

      - name: Fund test accounts via Friendbot
        run: |
          ADMIN="GAAZI4TCR3TY5OJHCTJC2A4QSY6CJWJH5IAJTGKIN2ER7LBNVKOCCWN"
          BENE="GBXGQJWVLWOYHFLZTKAQGE3GYKI1KNNBNSFZL2LT9KCD4NZNEFX7Y6Z"

          echo "Funding admin account…"
          curl -sf "http://localhost:8000/friendbot?addr=${ADMIN}" | jq -r '.hash // "already funded"' || echo "friendbot returned non-200 (ok)"

          echo "Funding beneficiary account…"
          curl -sf "http://localhost:8000/friendbot?addr=${BENE}" | jq -r '.hash // "already funded"' || echo "friendbot returned non-200 (ok)"

      - name: Start backend server
        working-directory: backend
        run: |
          npm start &
          echo "Backend PID: $!"
        env:
          NODE_ENV: e2e
          DB_HOST: localhost
          DB_USER: postgres
          DB_PASSWORD: password
          DB_NAME: vesting_vault
          PORT: 4000
          JWT_SECRET: e2e-test-jwt-secret-not-for-production
          JWT_REFRESH_SECRET: e2e-test-refresh-secret-not-for-production
          STELLAR_RPC_URL: http://localhost:8000/rpc
          STELLAR_HORIZON_URL: http://localhost:8000
          STELLAR_NETWORK_PASSPHRASE: "Standalone Network ; February 2017"

      - name: Wait for backend
        run: |
          echo "Waiting for backend at http://localhost:4000/health…"
          for i in $(seq 1 40); do
            if curl -sf http://localhost:4000/health | grep -q '"status":"OK"'; then
              echo "Backend is ready (attempt $i)"
              break
            fi
            echo "Attempt $i/40…"
            sleep 3
          done

      - name: Run Cypress E2E tests
        run: npx cypress run --reporter junit --reporter-options "mochaFile=cypress/results/e2e-[hash].xml"
        env:
          CYPRESS_BASE_URL: http://localhost:4000
          CYPRESS_STELLAR_RPC_URL: http://localhost:8000/rpc
          CYPRESS_STELLAR_HORIZON_URL: http://localhost:8000
          CYPRESS_STELLAR_NETWORK_PASSPHRASE: "Standalone Network ; February 2017"

      - name: Upload Cypress screenshots (on failure)
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: cypress-screenshots
          path: cypress/screenshots/
          retention-days: 7

      - name: Upload Cypress videos
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: cypress-videos
          path: cypress/videos/
          retention-days: 7

      - name: Upload Cypress JUnit results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: cypress-results
          path: cypress/results/
          retention-days: 7

      - name: Publish test results
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: "Cypress E2E Results"
          path: "cypress/results/*.xml"
          reporter: java-junit
          fail-on-error: true

  # ── Stage 5: Green Light Gate ─────────────────────────────────────────────────
  green-light:
    name: "GREEN LIGHT — Deployment Approved"
    runs-on: ubuntu-latest
    needs: [lint, unit-tests, contract-tests, e2e-tests]
    if: |
      always() &&
      needs.lint.result == 'success' &&
      needs.unit-tests.result == 'success' &&
      (needs.contract-tests.result == 'success' || needs.contract-tests.result == 'skipped') &&
      needs.e2e-tests.result == 'success'

    steps:
      - name: All gates passed — Green Light
        run: |
          echo "╔══════════════════════════════════════════════════════╗"
          echo "║                                                      ║"
          echo "║   ✅  GREEN LIGHT — Deployment Approved              ║"
          echo "║                                                      ║"
          echo "║   All quality gates passed:                          ║"
          echo "║   ✓ Lint & Static Analysis                           ║"
          echo "║   ✓ Backend Unit Tests                               ║"
          echo "║   ✓ Soroban Smart Contract Tests                     ║"
          echo "║   ✓ Cypress E2E User Journey                         ║"
          echo "║                                                      ║"
          echo "║   Branch: ${{ github.ref_name }}"
          echo "║   Commit: ${{ github.sha }}"
          echo "║   Run:    ${{ github.run_id }}"
          echo "╚══════════════════════════════════════════════════════╝"

  # Red light job — signals failure clearly in the PR checks list
  red-light:
    name: "RED LIGHT — Deployment Blocked"
    runs-on: ubuntu-latest
    needs: [lint, unit-tests, contract-tests, e2e-tests]
    if: |
      always() && (
        needs.lint.result == 'failure' ||
        needs.unit-tests.result == 'failure' ||
        needs.contract-tests.result == 'failure' ||
        needs.e2e-tests.result == 'failure'
      )

    steps:
      - name: Report blocking failures
        run: |
          echo "╔══════════════════════════════════════════════════════╗"
          echo "║                                                      ║"
          echo "║   🔴  RED LIGHT — Deployment Blocked                 ║"
          echo "║                                                      ║"
          echo "║   One or more quality gates failed.                  ║"
          echo "║   Fix failing jobs before deploying.                 ║"
          echo "║                                                      ║"
          echo "║   Lint:      ${{ needs.lint.result }}"
          echo "║   Unit:      ${{ needs.unit-tests.result }}"
          echo "║   Contracts: ${{ needs.contract-tests.result }}"
          echo "║   E2E:       ${{ needs.e2e-tests.result }}"
          echo "╚══════════════════════════════════════════════════════╝"
          exit 1
